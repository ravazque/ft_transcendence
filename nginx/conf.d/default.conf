# ─────────────────────────────────────────────────────────────────────
# Nginx site config — reverse proxy
#
# All traffic goes to the fullstack Nuxt container.
# Nuxt handles both frontend (SSR) and backend (/api) routes.
#
# Traffic flow:
#   Client -> :443 (SSL) -> nginx -> fullstack:3000 (Nuxt SSR + API)
#   Client -> :80 -> 301 redirect -> :443
# ─────────────────────────────────────────────────────────────────────

# ── HTTP -> HTTPS redirect ──
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Main site (HTTPS) ──
server {
    listen 443 ssl;
    server_name _;

    # ── SSL certificates ──
    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Fullstack (Nuxt SSR + API) ──
    # Nuxt serves both pages and /api/* server routes
    location / {
        proxy_pass http://fullstack:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API routes (explicit block for upload limits) ──
    location /api/ {
        proxy_pass http://fullstack:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    # ── WebSocket (Nuxt HMR in dev, real-time game features) ──
    location /_nuxt/hmr {
        proxy_pass http://fullstack:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── Directus CMS (admin panel + API) ──
    location /cms/ {
        proxy_pass http://directus:8055/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }
}
