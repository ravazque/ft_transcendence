# ─────────────────────────────────────────────────────────────────────
# Redis 7.4 — Configuration
#
# Primary use: session cache, rate limiting, frequent query cache.
# AOF persistence is enabled so sessions are not lost on restart.
# ─────────────────────────────────────────────────────────────────────

# ── Network ──
# Bind to all interfaces inside Docker (data_net only, no external exposure)
bind 0.0.0.0
port 6379

# No password in development (Redis is only reachable from data_net).
# Uncomment and set in production:
# requirepass ${REDIS_PASSWORD}

# ── Memory ──
# Maximum memory limit (adjust to match available server RAM)
maxmemory 256mb

# Eviction policy: remove least recently used keys first.
# Appropriate for cache data that can be regenerated.
maxmemory-policy allkeys-lru

# ── Persistence ──
# AOF (Append Only File): logs every write operation.
# Safer than RDB snapshots for preserving recent session data.
appendonly yes
appendfsync everysec

# Disable RDB snapshots (AOF is sufficient here)
save ""

# ── Logging ──
loglevel notice

# ── Performance ──
# Maximum number of simultaneous client connections
maxclients 100

# Idle connection timeout in seconds (0 = no timeout)
timeout 300

# TCP keepalive interval in seconds
tcp-keepalive 60
