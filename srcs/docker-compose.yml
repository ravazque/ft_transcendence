# ─────────────────────────────────────────────────────────────────────
# Docker Compose — Service orchestration
#
# Services:
#   nginx      - Reverse proxy + WAF (ModSecurity / OWASP CRS)
#   fullstack  - Nuxt 4 (SSR frontend + API server routes)
#   db         - PostgreSQL 17 (primary database, network-isolated)
#   redis      - Session cache, rate limiting
#   directus   - Headless CMS (future content management)
#
# Networks:
#   proxy_net - nginx <-> fullstack (HTTP traffic)
#   data_net  - fullstack <-> db, redis, directus (internal, no internet egress)
# ─────────────────────────────────────────────────────────────────────

services:

  # ── Nginx + ModSecurity WAF ──────────────────────────────────────
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    container_name: yoga_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTPS_PORT:-443}:443"
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./requirements/nginx/ssl:/etc/nginx/ssl:ro
    environment:
      MODSEC_RULE_ENGINE: "${MODSEC_RULE_ENGINE:-On}"
      PARANOIA: "${WAF_PARANOIA:-1}"
      ANOMALY_INBOUND: "5"
      ANOMALY_OUTBOUND: "4"
    depends_on:
      fullstack:
        condition: service_healthy
      directus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -skf https://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - proxy_net

  # ── Fullstack: Nuxt 4 (SSR + API) ──────────────────────────────
  # Single container serving frontend (SSR) and backend (server routes).
  # SSR calls to /api are in-process — no cross-container HTTP hop,
  # which eliminates first-load latency and SSR fetch failures.
  fullstack:
    build:
      context: ./requirements/fullstack
      dockerfile: Dockerfile
    container_name: yoga_fullstack
    restart: unless-stopped
    # The container runs as the built-in `node` user (UID 1000, set by the
    # Dockerfile's USER directive). We intentionally do NOT map the host's
    # UID/GID here because the 42 cluster assigns UIDs above Docker's
    # user-namespace limit (65535), which breaks `user:` on those hosts.
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DIRECTUS_URL: http://directus:8055
      DIRECTUS_KEY: ${DIRECTUS_KEY:-}
      DIRECTUS_SECRET: ${DIRECTUS_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://localhost:${NGINX_HTTPS_PORT:-443}/api/auth/google/callback}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SITE_URL: ${SITE_URL:-https://localhost:${NGINX_HTTPS_PORT:-443}}
      VIMEO_ACCESS_TOKEN: ${VIMEO_ACCESS_TOKEN:-}
      API_KEY: ${API_KEY:-}
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./requirements/fullstack:/app
      - /app/node_modules
      - /app/.nuxt
      - /app/.output
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - proxy_net
      - data_net
    ports:
      - "${PRISMA_STUDIO_PORT:-5555}:5555"

  # ── PostgreSQL ───────────────────────────────────────────────────
  db:
    image: postgres:17-bookworm
    container_name: yoga_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./requirements/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - data_net

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-bookworm
    container_name: yoga_redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
      - ./requirements/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - data_net

  # ── Directus CMS ────────────────────────────────────────────────
  # Headless CMS for managing course content, blog posts, and media.
  # Admin panel at http://directus:8055 (internal) or via nginx proxy.
  #
  # Bind-mounts (extensions/, snapshots/) must exist on the host before
  # `docker compose up` — otherwise Docker creates them as root and they
  # become unremovable without sudo. `make setup` pre-creates them with
  # the correct host UID/GID.
  directus:
    image: directus/directus:11
    container_name: yoga_directus
    restart: unless-stopped
    # No explicit `user:` — the image's default user is used. See the note on
    # the fullstack service above for why we don't map host UID/GID here.
    #
    # Custom command: bootstrap (idempotent — runs Directus migrations and
    # creates the admin if missing), then apply the version-controlled
    # schema snapshot if present, then start. This means a fresh deploy
    # comes up with all custom collections registered (modules, classes,
    # tagged_info, etc.) and avoids the "you don't have permission to
    # access collection X" error after `make clean && make all`.
    command:
      - sh
      - -c
      - |
        npx directus bootstrap && \
        if [ -f /directus/snapshots/schema.yaml ]; then \
          npx directus schema apply --yes /directus/snapshots/schema.yaml; \
        fi && \
        exec npx directus start
    environment:
      # Unset DATABASE_URL so Directus uses the DB_* vars below instead of
      # picking up the fullstack's DATABASE_URL from the shared .env file.
      DATABASE_URL: ""
      KEY: "${DIRECTUS_KEY}"
      SECRET: "${DIRECTUS_SECRET}"
      DB_CLIENT: "pg"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_DATABASE: "${POSTGRES_DB}"
      DB_USER: "${POSTGRES_USER}"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"
      DB_SSL: "false"
      ADMIN_EMAIL: "${DIRECTUS_ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD}"
      PUBLIC_URL: "${DIRECTUS_PUBLIC_URL:-https://localhost:${NGINX_HTTPS_PORT:-443}/cms}"
      CACHE_ENABLED: "true"
      CACHE_STORE: "redis"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    volumes:
      - directus_uploads:/directus/uploads
      - ./requirements/directus/extensions:/directus/extensions
      - ./requirements/directus/snapshots:/directus/snapshots
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8055/server/health', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - proxy_net
      - data_net

volumes:
  db_data:
    name: yoga_db_data
  redis_data:
    name: yoga_redis_data
  directus_uploads:
    name: yoga_directus_uploads

networks:
  proxy_net:
    name: yoga_proxy
  data_net:
    name: yoga_data
    internal: true
