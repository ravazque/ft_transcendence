# ─────────────────────────────────────────────────────────────────────
# Nginx site config — reverse proxy
#
# Traffic flow:
#   Client -> :80            -> 301 -> :443
#   Client -> :443 /         -> fullstack:3000  (Nuxt SSR + API)
#   Client -> :443 /api/     -> fullstack:3000  (Nuxt server routes)
#   Client -> :443 /cms/     -> directus:8055   (Directus admin + API)
#
# This file is baked into the nginx image at build time (Dockerfile COPY).
# After editing: rebuild with `make build && make up` (or `make re`).
# ─────────────────────────────────────────────────────────────────────

# ── HTTP -> HTTPS redirect ──
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# Suppress HSTS on localhost to prevent the browser from pinning the subdomain.
map $host $hsts_header {
    ~^(localhost|127\.0\.0\.1)$  "";
    default                       "max-age=31536000; includeSubDomains";
}

# ── Main site (HTTPS) ──
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── SSL certificates ──
    # The repository ships self-signed certificates generated by `make setup`,
    # which is what the dev environment expects. Production deployments point
    # both paths to a valid certificate issued by a trusted CA (Let's Encrypt
    # or similar).
    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Mozilla Intermediate (2024): TLS 1.2 + 1.3, modern AEAD ciphers only.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security $hsts_header always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self)" always;
    # Cross-origin isolation: prevents the page from sharing a browsing context
    # group with cross-origin windows (mitigates Spectre-class side-channels and
    # tab-nabbing).
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # Restricts which origins can embed our subresources (images, scripts) via
    # <img>, <script>, fetch() with no-cors, etc.
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-DNS-Prefetch-Control "off" always;
    # CSP managed by Nuxt (nuxt-security) — do not define here.
    # Nuxt injects the nonce into every request and builds the header dynamically.

    # ── Upstream error fallback ──
    # Served when fullstack or directus is temporarily unavailable (e.g. first boot).
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ── Health check endpoint ──
    # Used by the container healthcheck. Bypasses upstream and access logs.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── Fullstack (Nuxt SSR + API) ──
    location / {
        proxy_pass http://fullstack:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_next_upstream   error timeout http_502 http_503 http_504;
    }

    # ── API routes ──
    location /api/ {
        proxy_pass http://fullstack:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        client_max_body_size  10m;
    }

    # ── WebSocket (Nuxt HMR in dev, future real-time features) ──
    location /_nuxt/hmr {
        proxy_pass http://fullstack:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── Directus CMS ──
    # The CMS panel is reachable from any IP in development. Production
    # deployments restrict it by IP using an allow/deny block here, e.g.:
    #
    #   allow 1.2.3.4;    # office / VPN static IP
    #   deny  all;
    #
    location /cms/ {
        proxy_pass http://directus:8055/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }
}
